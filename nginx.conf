server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Headers (Hardening)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.ahrefs.com https://www.googletagmanager.com https://www.clarity.ms https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com https://www.clarity.ms; connect-src 'self' https://analytics.ahrefs.com https://www.googletagmanager.com https://*.google-analytics.com https://*.analytics.google.com https://www.clarity.ms;" always;

    # Programmatic SEO Routes mappings to single page app
    location ~ ^/(squat-1rm-calculator|bench-press-warm-up-planner|rpe-rir-translator|advanced-1rm-estimator)$ {
        rewrite ^ /index.html break;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Custom 404 Error Page
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}
