name: Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      # Trivy ile Dosya Sistemi ve Secret Taraması
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e # master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1' # Zaafiyet bulursa pipeline'ı patlat (fail et)
          severity: 'CRITICAL,HIGH' # Sadece Yüksek ve Kritik seviyeleri önemse
